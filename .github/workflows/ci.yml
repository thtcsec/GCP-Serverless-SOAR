name: GCP Cloud Function SOAR CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff pip-audit
        
    - name: Lint with Ruff
      run: |
        ruff check src tests

    - name: Check formatting with Ruff
      run: |
        ruff format --check src tests
        
    - name: Security scan with Bandit
      run: |
        bandit -r src -ll -ii

    - name: Dependency vulnerability scan (pip-audit)
      run: |
        pip-audit -r requirements.txt

    - name: Type check with mypy
      run: |
        mypy src --ignore-missing-imports --no-strict-optional
        
    - name: Run Pytest with coverage
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing

  iac_scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.5

    - name: Terraform fmt (check)
      run: |
        terraform fmt -check -recursive terraform/

    - name: Terraform validate (all envs, no backend)
      shell: bash
      run: |
        set -euo pipefail
        for env in terraform/environments/*; do
          if [ -d "$env" ]; then
            echo "Validating: $env"
            (cd "$env" && terraform init -backend=false -input=false && terraform validate)
          fi
        done

    - name: Run Checkov IaC Security Scan
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: terraform/
        framework: terraform
        soft_fail: false
        output_format: cli
